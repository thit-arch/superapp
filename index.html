                  ${isDetailsOpen ? 'w-96' : 'w-0 border-l-0 overflow-hidden'}`}
              >
                  <div className="w-96 h-full flex flex-col">
                    <div className="absolute right-4 top-4 z-10">
                      <button onClick={() => setIsDetailsOpen(false)} className="p-1 text-slate-400 hover:text-slate-800 transition-colors">
                        <PanelRightClose className="w-5 h-5" />
                      </button>
                    </div>

                    <div className="p-6 sticky top-0 bg-white z-10 border-b border-slate-100">
                        <div className="flex items-center space-x-3 pr-8">
                            <div className="p-2 bg-slate-50 rounded-lg shrink-0 shadow-sm border border-slate-200">
                                {architectureData[selectedNode].icon}
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-slate-800 leading-tight">{architectureData[selectedNode].title}</h2>
                                <span className="text-xs font-mono text-slate-500 px-2 py-0.5 bg-slate-100 rounded border border-slate-200 inline-block mt-1">
                                    {architectureData[selectedNode].role}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="p-6 space-y-4">
                        {/* Collapsible Tech Stack */}
                        <SidebarSection 
                          title="Technology Stack" 
                          icon={Cpu} 
                          isOpen={expandedSections.tech} 
                          onToggle={() => toggleSection('tech')}
                        >
                          <p className="text-sm text-slate-700 font-mono leading-relaxed whitespace-pre-line">
                            {architectureData[selectedNode].tech}
                          </p>
                        </SidebarSection>
                  
                        {/* Collapsible Mapping Section - NEW */}
                        {architectureData[selectedNode].backbaseMap && (
                            <SidebarSection 
                              title="Backbase Equivalent" 
                              icon={Layers} 
                              isOpen={expandedSections.mapping} 
                              onToggle={() => toggleSection('mapping')}
                            >
                               <div className="p-3 bg-blue-50 border border-blue-100 rounded-md">
                                   <p className="text-sm font-bold text-blue-800">
                                      {architectureData[selectedNode].backbaseMap}
                                   </p>
                                   <p className="text-xs text-blue-600 mt-1">
                                      Maps to standard Backbase component structure.
                                   </p>
                               </div>
                            </SidebarSection>
                        )}

                        {/* Collapsible Trade-off Analysis (Conditional) */}
                        {architectureData[selectedNode].optionsComparison && (
                          <SidebarSection 
                            title="Trade-off Analysis" 
                            icon={GitCompare} 
                            isOpen={expandedSections.tradeoff} 
                            onToggle={() => toggleSection('tradeoff')}
                          >
                            <div className="space-y-3">
                              {architectureData[selectedNode].optionsComparison.map((opt, idx) => (
                                <div key={idx} className="bg-white p-3 rounded border border-slate-200 shadow-sm">
                                  <p className="text-xs font-bold text-slate-800 mb-2">{opt.option}</p>
                                  <div className="space-y-2">
                                    <div className="flex items-start gap-2 text-xs text-slate-600">
                                      <span className="text-emerald-600 font-bold text-[10px] uppercase min-w-[32px]">Pros</span>
                                      <span className="leading-tight">{opt.pros}</span>
                                    </div>
                                    <div className="flex items-start gap-2 text-xs text-slate-600">
                                      <span className="text-rose-600 font-bold text-[10px] uppercase min-w-[32px]">Cons</span>
                                      <span className="leading-tight">{opt.cons}</span>
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </SidebarSection>
                        )}

                        {/* Collapsible Architecture Model */}
                        <SidebarSection 
                          title="Architecture Model" 
                          icon={Share2} 
                          isOpen={expandedSections.arch} 
                          onToggle={() => toggleSection('arch')}
                        >
                           <p className="text-sm text-slate-700 font-medium leading-relaxed whitespace-pre-line">
                              {architectureData[selectedNode].archModel}
                           </p>
                        </SidebarSection>

                        {/* Collapsible Key Responsibilities */}
                        <SidebarSection 
                          title="Key Responsibilities" 
                          icon={CheckCircle} 
                          isOpen={expandedSections.details} 
                          onToggle={() => toggleSection('details')}
                        >
                          <ul className="space-y-3">
                            {architectureData[selectedNode].details.map((detail, idx) => (
                              <li key={idx} className="flex items-start text-sm text-slate-700">
                                <div className="mt-1 mr-2 min-w-[6px] h-[6px] rounded-full bg-blue-500 shrink-0"></div>
                                {detail}
                              </li>
                            ))}
                          </ul>
                        </SidebarSection>

                        {/* Collapsible Architect's Note */}
                        <SidebarSection 
                          title="Architect's Note" 
                          icon={AlertCircle} 
                          isOpen={expandedSections.note} 
                          onToggle={() => toggleSection('note')}
                        >
                          <div className="bg-amber-50 border-l-4 border-amber-400 p-3 rounded-r-lg">
                            <p className="text-sm text-amber-800/90 italic leading-relaxed">
                                "{architectureData[selectedNode].malaysiaContext}"
                            </p>
                          </div>
                        </SidebarSection>

                        {/* Action Buttons (Always Visible) */}
                        <div className="pt-4 mt-4 border-t border-slate-200">
                            <button className="w-full py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded transition-colors flex items-center justify-center border border-slate-300">
                                <FileText className="w-4 h-4 mr-2" /> View Spec Documentation
                            </button>
                        </div>
                    </div>
                  </div>
              </aside>
            </div>
          </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BankSuperAppArchitecture />);
  </script>
</body>
</html>
